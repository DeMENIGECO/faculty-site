<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 - Faculty Editor</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
  --purple: #7a68d8;
  --bg: #0f0f14;
  --lime: #c6ff00;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #1a1625, var(--bg));
  color: white;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: linear-gradient(90deg, #7a68d8, #5c4bc7);
  padding: 14px 18px;
}

.navbar h1 {
  margin: 0;
  font-size: 20px;
  color: #0f0f14;
  font-weight: 900;
}

.hamburger {
  font-size: 26px;
  cursor: pointer;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  top: 0;
  left: -320px;
  width: 300px;
  height: 100%;
  background: #1a1625;
  box-shadow: 10px 0 30px rgba(0,0,0,0.5);
  transition: 0.3s ease;
  z-index: 1000;
}

.sidebar.open {
  left: 0;
}

.sidebar iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* OVERLAY */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  z-index: 999;
}

.overlay.show {
  display: block;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px 20px;
}

.hero h2 {
  font-size: 52px;
  margin-bottom: 10px;
}

.hero p {
  opacity: 0.8;
}

/* FINESTRA MAC */
.window {
  width: 90%;
  max-width: 700px;
  margin: 30px auto;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 15px 40px rgba(0,0,0,0.4);
}

.window-header {
  background: var(--purple);
  padding: 10px;
  display: flex;
  align-items: center;
}

.buttons {
  display: flex;
  gap: 8px;
}

.btn {
  width: 12px;
  height: 12px;
  border-radius: 50%;
}

.red { background: #ff5f56; }
.yellow { background: #ffbd2e; }
.green { background: #27c93f; }

.window-content {
  background: #0f0f14;
  color: var(--lime);
  font-family: monospace;
  padding: 20px;
  white-space: pre;
  font-size: 14px;
}

/* BOTTONE HOME FISSO */
.home-btn-bottom {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--lime);
  color: #0f0f14;
  border: none;
  padding: 14px 30px;
  font-size: 16px;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  transition: 0.2s;
  z-index: 2000;
}

.home-btn-bottom:hover {
  transform: translateX(-50%) scale(1.05);
}

.home-btn-bottom:active {
  transform: translateX(-50%) scale(0.95);
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h2>Whoops!</h2>
  <p>Non abbiamo trovato niente qui</p>
</div>

<!-- FINESTRA CODICE -->
<div class="window">
  <div class="window-header">
    <div class="buttons">
      <div class="btn red"></div>
      <div class="btn yellow"></div>
      <div class="btn green"></div>
    </div>
  </div>

  <div class="window-content">
# Faculty Editor - Python Engine

try:
    request = get_user_request()
    load_page(request)

except PageNotFoundError:
    print("Whoops! 404!")
    redirect("/404")
  </div>
</div>

<!-- BOTTONE HOME -->
<button class="home-btn-bottom" onclick="window.location.href='https://demenigeco.github.io/faculty-site'">
  <i class="fa-solid fa-house"></i> Torna alla Home
</button>

<script>
const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

window.toggleMenu = function () {
  sidebar.classList.toggle("open");
  overlay.classList.toggle("show");
};

window.closeMenu = function () {
  sidebar.classList.remove("open");
  overlay.classList.remove("show");
};
</script>

</body>
</html>
